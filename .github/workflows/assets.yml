name: Generate Profile Assets

on:
  schedule:
    # Refresh every 6 hours so metrics stay live
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # 1) Snake animation — generates SVGs into dist/
      # ---------------------------------------------------------------
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-light
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#7AA2F7&color_dots=#1A1B26,#283457,#3D59A1,#7AA2F7,#BB9AF7

      # ---------------------------------------------------------------
      # 2) Push snake SVGs to `output` branch additively (keep_files:true
      #    so subsequent metrics commits don't get wiped).
      # ---------------------------------------------------------------
      - name: Publish snake to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
          keep_files: true
          commit_message: "chore(snake): refresh animation"

      # ---------------------------------------------------------------
      # 3) Lowlighter Metrics — committed directly to `output` branch.
      #    https://github.com/lowlighter/metrics
      # ---------------------------------------------------------------
      - name: Metrics — Overview
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Tanbin-CS
          filename: metrics.svg
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Dhaka
          config_display: large
          output_action: commit
          committer_branch: output
          committer_token: ${{ secrets.METRICS_TOKEN }}
          committer_message: "chore(metrics): refresh overview"

      - name: Metrics — Top Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Tanbin-CS
          filename: metrics-languages.svg
          base: ""
          config_timezone: Asia/Dhaka
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          output_action: commit
          committer_branch: output
          committer_token: ${{ secrets.METRICS_TOKEN }}
          committer_message: "chore(metrics): refresh languages"

      - name: Metrics — Isocalendar (3D contributions)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Tanbin-CS
          filename: metrics-isocalendar.svg
          base: ""
          config_timezone: Asia/Dhaka
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          output_action: commit
          committer_branch: output
          committer_token: ${{ secrets.METRICS_TOKEN }}
          committer_message: "chore(metrics): refresh isocalendar"
