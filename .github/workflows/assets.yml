name: Generate Profile Assets

on:
  schedule:
    # Refresh every 6 hours so metrics stay live
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # Snake animation that "eats" your contribution squares
      # ---------------------------------------------------------------
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?palette=github-light
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#7AA2F7&color_dots=#1A1B26,#283457,#3D59A1,#7AA2F7,#BB9AF7

      # ---------------------------------------------------------------
      # Lowlighter Metrics — fully self-hosted live stats
      # https://github.com/lowlighter/metrics
      # ---------------------------------------------------------------
      - name: Metrics — Overview
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Tanbin-CS
          filename: dist/metrics.svg
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Dhaka
          config_display: large
          output_action: none

      - name: Metrics — Top Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Tanbin-CS
          filename: dist/metrics-languages.svg
          base: ""
          config_timezone: Asia/Dhaka
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          output_action: none

      - name: Metrics — Isocalendar (3D contributions)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Tanbin-CS
          filename: dist/metrics-isocalendar.svg
          base: ""
          config_timezone: Asia/Dhaka
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          output_action: none

      # ---------------------------------------------------------------
      # Publish everything in dist/ to the `output` branch so the README
      # can serve them via raw.githubusercontent.com (always reliable).
      # ---------------------------------------------------------------
      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
